apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: payment-secret

spec:
  refreshInterval: 30s

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: payment-secret
    creationPolicy: Owner

  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: payment-secret
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key: payment-secret
        property: DB_PASSWORD

    - secretKey: JWT_SECRET
      remoteRef:
        key: payment-secret
        property: JWT_SECRET